<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Onetap Browser</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f1f3f4;
    text-align: center;
}

.header {
    background: white;
    padding: 20px;
}

.icon {
    width: 90px;
    border-radius: 20px;
}

.title {
    font-size: 24px;
    font-weight: bold;
    margin-top: 10px;
}

.rating {
    color: green;
    margin-top: 5px;
}

.install-btn {
    margin: 20px;
    padding: 15px;
    background: #1a73e8;
    color: white;
    border-radius: 10px;
    font-size: 18px;
    cursor: pointer;
}

.status {
    margin-top: 20px;
    color: #555;
}
</style>

<script>
function openApp() {

    var start = Date.now();

    // 🔥 App खोलने की कोशिश
    window.location.href = "onetap://video";

    // 🔥 अगर app नहीं है → APK download
    setTimeout(function () {
        var end = Date.now();

        if (end - start < 2000) {
            window.location.href = "https://github.com/Anujdemos/onetap-download/releases/download/v1.0/app-debug.apk";
        }
    }, 1500);
}

// Auto run
window.onload = openApp;
</script>

</head>

<body>

<div class="header">
    <img src="logo.png" class="icon">
    <div class="title">Onetap Browser</div>
    <div class="rating">⭐ 4.8 • 50K+ Downloads</div>
</div>

<div class="install-btn" onclick="openApp()">
    Open / Install App
</div>

<div class="status">
    Opening app... If not installed, downloading APK
</div>

</body>
</html>
