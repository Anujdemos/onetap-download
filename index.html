<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script>
function openApp() {

    var hidden = false;

    // 🔥 detect app open (page hidden)
    document.addEventListener("visibilitychange", function () {
        if (document.hidden) {
            hidden = true;
        }
    });

    // 🔥 deep link try
    window.location.href = "onetap://video";

    // 🔥 fallback (delay बढ़ाया)
    setTimeout(function () {
        if (!hidden) {
            window.location.href = "https://github.com/Anujdemos/onetap-download/releases/download/v1.0/app-debug.apk";
        }
    }, 3000); // 👉 पहले 1500 था, अब 3000
}

window.onload = openApp;
</script>

</head>

<body style="text-align:center; font-family:sans-serif; padding-top:50px;">

<h2>Opening App...</h2>
<p>If app not installed, downloading...</p>

<button onclick="openApp()" style="padding:15px; font-size:18px;">
Open / Install App
</button>

</body>
</html>
