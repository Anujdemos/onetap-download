<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Onetap Browser</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f1f3f4;
}

/* HEADER */
.header {
    background: #fff;
    padding: 20px;
    display: flex;
    align-items: center;
}

.icon {
    width: 80px;
    height: 80px;
    border-radius: 20px;
}

.info {
    margin-left: 15px;
}

.title {
    font-size: 22px;
    font-weight: bold;
}

.rating {
    color: green;
}

/* BUTTON */
.install-btn {
    margin: 20px;
    padding: 15px;
    background: #1a73e8;
    color: white;
    text-align: center;
    border-radius: 10px;
    font-size: 18px;
    cursor: pointer;
}

/* SCREENSHOTS */
.screenshots {
    display: flex;
    overflow-x: scroll;
    padding: 10px;
}

.screenshots img {
    width: 230px;
    margin-right: 10px;
    border-radius: 12px;
}

/* DESCRIPTION */
.desc {
    padding: 15px;
    color: #333;
}
</style>

<script>
// 🔥 APP OPEN FUNCTION
function openApp() {
    window.location.href = "onetap://video";
}

// 🔥 DOWNLOAD FUNCTION
function downloadApp() {
    window.location.href = "https://github.com/Anujdemos/onetap-download/releases/download/v1.0/app-debug.apk";
}

// 🔥 AUTO TRY (NO FORCE DOWNLOAD)
window.onload = function() {
    setTimeout(openApp, 500);
}
</script>

</head>

<body>

<!-- HEADER -->
<div class="header">
    <img src="logo.png" class="icon">
    <div class="info">
        <div class="title">Onetap Browser</div>
        <div class="rating">⭐ 4.8 • 50K+ Downloads</div>
    </div>
</div>

<!-- BUTTON -->
<div class="install-btn" onclick="openApp()">
    ▶ Open App
</div>

<div class="install-btn" onclick="downloadApp()" style="background:#34a853;">
    ⬇ Download App
</div>

<!-- SCREENSHOTS -->
<div class="screenshots">
    <img src="screen1.jpg">
    <img src="screen2.jpg">
    <img src="screen3.jpg">
</div>

<!-- DESCRIPTION -->
<div class="desc">
    Onetap Browser lets you watch and access all your favorite videos instantly.
    Fast, secure and easy to use. Install now and enjoy unlimited content.
</div>

</body>
</html>
