<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Onetap Browser</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f1f3f4;
}

/* HEADER */
.header {
    background: #fff;
    padding: 20px;
    display: flex;
    align-items: center;
}

.icon {
    width: 80px;
    height: 80px;
    border-radius: 20px;
}

.info {
    margin-left: 15px;
}

.title {
    font-size: 22px;
    font-weight: bold;
}

.rating {
    color: green;
}

/* BUTTON */
.install-btn {
    margin: 15px;
    padding: 15px;
    background: #1a73e8;
    color: white;
    text-align: center;
    border-radius: 10px;
    font-size: 18px;
    cursor: pointer;
}

.download-btn {
    background: #34a853;
}

/* SCREENSHOTS */
.screenshots {
    display: flex;
    overflow-x: scroll;
    padding: 10px;
}

.screenshots img {
    width: 230px;
    margin-right: 10px;
    border-radius: 12px;
}

/* DESC */
.desc {
    padding: 15px;
    color: #333;
}
</style>

<script>
function openApp() {
    window.location.href = "onetap://video?id=1";
}

function downloadApp() {
    window.location.href = "https://github.com/Anujdemos/onetap-download/releases/download/v2.0/Onetap_brower.apk";
}

// 🔥 AUTO SYSTEM (SMART)
window.onload = function() {

    var hidden = false;

    document.addEventListener("visibilitychange", function () {
        if (document.hidden) {
            hidden = true;
        }
    });

    // try open app
    setTimeout(function(){
        openApp();
    }, 500);

    // fallback download
    setTimeout(function(){
        if (!hidden) {
            downloadApp();
        }
    }, 3500);
};
</script>

</head>

<body>

<!-- HEADER -->
<div class="header">
    <img src="logo.png" class="icon">
    <div class="info">
        <div class="title">Onetap Browser</div>
        <div class="rating">⭐ 4.8 • 50K+ Downloads</div>
    </div>
</div>

<!-- BUTTONS -->
<div class="install-btn" onclick="openApp()">
    ▶ Open App
</div>

<div class="install-btn download-btn" onclick="downloadApp()">
    ⬇ Download App
</div>

<!-- SCREENSHOTS -->
<div class="screenshots">
    <img src="screen1.jpg">
    <img src="screen2.jpg">
    <img src="screen3.jpg">
</div>

<!-- DESCRIPTION -->
<div class="desc">
    Onetap Browser lets you watch all videos in one place.
    Fast, secure and easy to use. Install now and enjoy unlimited content.
</div>

</body>
</html>
